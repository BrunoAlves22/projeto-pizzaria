services:
  postgres:
    image: postgres:18
    container_name: pizzaria_postgres
    restart: always
    env_file:
      - "./backend/.env"
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 5s
      retries: 5
  api:
    build: ./backend
    env_file:
      - "./backend/.env"
    container_name: pizzaria_api
    ports:
      - "3333:3333"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npx prisma migrate deploy && npm run dev"
volumes:
  pgdata:
